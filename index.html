<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>学府餐厅</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-container">
    <!-- 背景 -->
    <div class="background"></div>
    
    <!-- 顶部标题 -->
    <div class="header">
      <h1>学府餐厅</h1>
    </div>
    
    <!-- 昵称输入区 -->
    <div class="nick-section">
      <label class="label">你的昵称</label>
      <input type="text" id="nickInput" class="input-field" placeholder="请输入昵称">
    </div>
    
    <!-- 游戏卡片区域 -->
    <div class="game-cards">
      <div class="game-card" id="tugOfWarCard">
        <div class="card-icon">🤝</div>
        <div class="card-title">拔河比赛</div>
        <div class="card-desc">团队协作，一起发力！</div>
        <button class="card-btn">开始游戏</button>
      </div>
    </div>
    
    <!-- 创建房间弹窗 -->
    <div class="modal-overlay" id="createModal">
      <div class="modal">
        <div class="modal-header">
          <h2>🏠 创建房间</h2>
          <button class="close-btn" id="closeCreateModal">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>选择游戏</label>
            <div class="game-type-selector">
              <button class="game-type-btn active" data-game="tug-of-war">
                <span class="game-type-icon">🤝</span>
                <span class="game-type-name">拔河比赛</span>
              </button>
              <button class="game-type-btn" data-game="reaction">
                <span class="game-type-icon">⚡</span>
                <span class="game-type-name">反应大比拼</span>
              </button>
              <button class="game-type-btn" data-game="memory">
                <span class="game-type-icon">🧠</span>
                <span class="game-type-name">数字记忆王</span>
              </button>
              <button class="game-type-btn" data-game="draw-guess">
                <span class="game-type-icon">🎨</span>
                <span class="game-type-name">你画我猜</span>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label>房间名称</label>
            <input type="text" id="roomNameInput" class="input-field" placeholder="输入房间名称">
          </div>
          <div class="form-group">
            <label>每队人数</label>
            <div class="number-buttons">
              <button class="num-btn active">1</button>
              <button class="num-btn">2</button>
              <button class="num-btn">3</button>
              <button class="num-btn">4</button>
              <button class="num-btn">5</button>
              <button class="num-btn">6</button>
              <button class="num-btn">8</button>
              <button class="num-btn">10</button>
            </div>
            <span class="selected-size">5人</span>
          </div>
          <div class="form-group">
            <label>密码(可选)</label>
            <input type="password" id="roomPwdInput" class="input-field" placeholder="留空不设密码">
          </div>
        </div>
        <div class="modal-footer">
          <button class="primary-btn" id="createRoomBtn">✅ 创建房间</button>
        </div>
      </div>
    </div>
    
    <!-- 加入房间弹窗 -->
    <div class="modal-overlay" id="joinModal">
      <div class="modal">
        <div class="modal-header">
          <h2>🔗 加入房间</h2>
          <button class="close-btn" id="closeJoinModal">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>房间ID</label>
            <input type="text" id="roomIdInput" class="input-field" placeholder="输入房间ID">
          </div>
          <div class="form-group">
            <label>房间密码</label>
            <input type="password" id="joinPwdInput" class="input-field" placeholder="输入密码（如有）">
          </div>
        </div>
        <div class="modal-footer">
          <button class="primary-btn" id="joinRoomBtn">🔗 加入房间</button>
        </div>
      </div>
    </div>
    
    <!-- 按钮区 -->
    <div class="button-area">
      <button class="action-btn" id="createBtn">➕ 创建房间</button>
      <button class="action-btn secondary" id="joinBtn">🔗 加入房间</button>
    </div>
    
    <!-- 在线人数 -->
    <div class="online-info">
      <span class="online-icon">👥</span>
      <span id="onlineCount">0</span> 人在线
    </div>
  </div>
  
  <script src="js/config.js"></script>
  <script src="js/network.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
